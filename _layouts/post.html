---
layout: default
---

<article class="post">
  <div class="container">
    <div class="post-header">
      <p class="eyebrow">{{ page.date | date: "%B %d, %Y" }}</p>
      <h1>{{ page.title }}</h1>
      {% if page.tags %}
      <div class="tag-row">
        {% for tag in page.tags %}
          <span class="tag">#{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </div>
    <div class="post-body">
      {{ content }}
    </div>
  </div>
</article>
